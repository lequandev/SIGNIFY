spring:
  application:
    name: Signify

jwt:
  secret-key: ${JWT_SECRET_KEY}
  expiration-time: ${JWT_EXP_TIME:3600}
  refresh-expiration-time: ${JWT_REFRESH_EXP_TIME:604800}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://signify-*.onrender.com,https://signify-g3zb.onrender.com}

app:
  name: Signify

payos:
  client-id: ${PAYOS_CLIENT_ID}
  api-key: ${PAYOS_API_KEY}
  checksum-key: ${PAYOS_CHECKSUM_KEY}
  return-url: ${FRONTEND_URL:https://signify.onrender.com}/payment-success
  cancel-url: ${FRONTEND_URL:https://signify.onrender.com}/payment-cancel

google:
  client-id: ${GOOGLE_CLIENT_ID}
