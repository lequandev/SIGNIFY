server:
  port: ${APP_PORT:8080}

spring:
  application:
    name: Signify
  data:
    mongodb:
      host: localhost
      port: 27017
      database: signify
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USER:de180077trantheluong@gmail.com}
    password: ${EMAIL_PASS:dhxk lobq ezff mtel}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

gemini:
  # Không hard-code key ở đây. Đặt GEMINI_API_KEY trong file .env (không commit).
  api-key: ${GEMINI_API_KEY:}

anthropic:
  # Đặt ANTHROPIC_API_KEY trong .env (không commit). Dùng để tách gloss thay Gemini.
  api-key: ${ANTHROPIC_API_KEY:}
  model: ${ANTHROPIC_MODEL:claude-3-5-haiku-20241022}

grok:
  # Groq (groq.com) — tương thích OpenAI, nhanh + có free tier. Đặt GROK_API_KEY trong .env.
  api-key: ${GROK_API_KEY:}
  model: ${GROK_MODEL:llama-3.3-70b-versatile}
