<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signify - Bảng Điều Khiển</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090e;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --primary: #6366f1;
      --secondary: #a855f7;
      --accent: #10b981;
      --text: #f3f4f6;
    }

    body {
      margin: 0;
      padding: 16px;
      width: 280px;
      background: var(--bg);
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    .container {
      background: linear-gradient(135deg, rgba(255,255,255,0.01) 0%, rgba(255,255,255,0.03) 100%);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      backdrop-filter: blur(8px);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--glass-border);
      padding-bottom: 12px;
    }

    .logo-container {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-container img {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(to right, #ffffff, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    .status-item {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      padding: 10px 12px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .status-label {
      opacity: 0.8;
    }

    .badge {
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
    }

    .badge.active {
      background: rgba(16, 185, 129, 0.15);
      color: var(--accent);
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .badge.inactive {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .badge.checking {
      background: rgba(245, 158, 11, 0.15);
      color: #f59e0b;
      border: 1px solid rgba(245, 158, 11, 0.3);
    }

    .btn {
      width: 100%;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border: none;
      color: white;
      padding: 10px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .footer {
      text-align: center;
      font-size: 10px;
      opacity: 0.5;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-container"><img src="icons/logo.png" alt="Signify"></div>
      <div class="title">SIGNIFY</div>
    </div>
    <div class="status-group">
      <div class="status-item">
        <span class="status-label">Trang YouTube:</span>
        <span id="yt-status" class="badge inactive">Chưa mở</span>
      </div>
      <div class="status-item">
        <span class="status-label">Signify Backend:</span>
        <span id="be-status" class="badge checking">Đang kiểm tra...</span>
      </div>
    </div>
    <button class="btn" id="toggle-overlay">Ẩn/Hiện Trình Dịch</button>
    <div class="footer">SIGNIFY - Dịch Ngôn Ngữ Ký Hiệu AI © 2026</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
